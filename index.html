<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Pickleball Tracker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

    :root {
      --bg-dark: #020617;
      --card-bg: rgba(30, 41, 59, 0.5);
      --card-border: rgba(255, 255, 255, 0.08);
      --primary: #10b981;
      --primary-glow: rgba(16, 185, 129, 0.4);
      --primary-hover: #059669;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --modal-bg: rgba(15, 23, 42, 0.85);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', sans-serif;
    }

    body {
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(16, 185, 129, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(14, 165, 233, 0.08), transparent 25%);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      padding: 30px 20px;
      text-align: center;
      background: rgba(2, 6, 23, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--card-border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-weight: 800;
      font-size: 32px;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    header h1 span {
      background: linear-gradient(135deg, #10b981, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .section-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 24px;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* Loading Spinner */
    #loader {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 200px;
      font-size: 20px;
      color: var(--primary);
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--card-border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 15px;
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* Leaderboard Grid */
    .leaderboard {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      padding: 24px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 4px;
      background: var(--card-border);
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.4), 0 0 20px var(--primary-glow);
      border-color: rgba(16, 185, 129, 0.3);
    }

    .card:hover::before {
      background: var(--primary);
    }

    /* Rank Styles */
    .card[data-rank="1"]::before { background: linear-gradient(90deg, #fbbf24, #f59e0b); }
    .card[data-rank="2"]::before { background: linear-gradient(90deg, #94a3b8, #cbd5e1); }
    .card[data-rank="3"]::before { background: linear-gradient(90deg, #b45309, #d97706); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .rank {
      font-size: 28px;
      font-weight: 800;
      color: var(--card-border);
      transition: color 0.3s;
    }

    .card:hover .rank {
      color: var(--primary);
    }
    
    .card[data-rank="1"] .rank { color: #fbbf24; }
    .card[data-rank="2"] .rank { color: #cbd5e1; }
    .card[data-rank="3"] .rank { color: #d97706; }

    .player-name {
      font-size: 22px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-label {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 600;
    }

    /* Floating Action Buttons */
    .fab-container {
      position: fixed;
      bottom: 40px;
      right: 40px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      z-index: 50;
    }

    .fab {
      background: var(--primary);
      color: #020617;
      border: none;
      border-radius: 50%;
      width: 64px;
      height: 64px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .fab:hover {
      transform: scale(1.1) rotate(5deg);
      background: var(--primary-hover);
      box-shadow: 0 12px 32px var(--primary-glow);
    }
    
    .fab svg {
      width: 28px;
      height: 28px;
    }

    .fab-tooltip {
      position: absolute;
      right: 80px;
      background: rgba(30, 41, 59, 0.9);
      color: white;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transform: translateX(10px);
      transition: all 0.3s ease;
      border: 1px solid var(--card-border);
      backdrop-filter: blur(4px);
    }

    .fab:hover .fab-tooltip {
      opacity: 1;
      transform: translateX(0);
    }

    .fab-secondary {
      background: #1e293b;
      color: var(--primary);
      width: 56px;
      height: 56px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      border: 1px solid var(--card-border);
      align-self: flex-end;
    }
    
    .fab-secondary:hover {
      background: #334155;
      border-color: var(--primary);
      color: var(--primary);
      transform: scale(1.1) rotate(-5deg);
    }

    /* Modals */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: var(--modal-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
    }

    .modal-content {
      background: #0f172a;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      border-radius: 20px;
      border: 1px solid var(--card-border);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
      transform: scale(0.95);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal.active .modal-content {
      transform: scale(1);
    }

    .modal h3 {
      font-size: 24px;
      margin-bottom: 24px;
      color: white;
      text-align: center;
    }

    .close-modal {
      position: absolute;
      top: 16px;
      right: 16px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 8px;
    }

    .close-modal:hover {
      color: white;
    }

    .close-modal svg {
      width: 24px;
      height: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group.row {
      display: flex;
      gap: 16px;
    }

    .form-group.row > div {
      flex: 1;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 600;
    }

    select, input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      color: white;
      font-size: 16px;
      outline: none;
      transition: all 0.2s ease;
    }

    select:focus, input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
    }

    button.submit {
      width: 100%;
      background: var(--primary);
      color: #020617;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.2s ease;
    }

    button.submit:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
    }

    button.submit:active {
      transform: translateY(0);
    }

    @media(max-width: 768px) {
      .fab-container {
        bottom: 20px;
        right: 20px;
      }
      .modal-content {
        margin: 20px;
        width: auto;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="url(#gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <defs>
        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#10b981" />
          <stop offset="100%" stop-color="#3b82f6" />
        </linearGradient>
      </defs>
      <circle cx="12" cy="12" r="10"></circle>
      <path d="M8 12c1.5 0 3-1.5 4-4"></path>
      <path d="M16 12c-1.5 0-3 1.5-4 4"></path>
      <path d="M12 8v8"></path>
    </svg>
    <span>Elite Pickleball</span> Tracker
  </h1>
</header>

<div class="container">
  <div class="section-title">
    Leaderboard Ratings
  </div>
  
  <div id="loader">
    <div class="spinner"></div> Loading player stats...
  </div>

  <div id="leaderboard" class="leaderboard"></div>
</div>

<div class="fab-container">
  <!-- History / Delete FAB -->
  <button class="fab fab-secondary" onclick="openHistoryModal()">
    <div class="fab-tooltip">Match History</div>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="8" y1="6" x2="21" y2="6"></line>
      <line x1="8" y1="12" x2="21" y2="12"></line>
      <line x1="8" y1="18" x2="21" y2="18"></line>
      <line x1="3" y1="6" x2="3.01" y2="6"></line>
      <line x1="3" y1="12" x2="3.01" y2="12"></line>
      <line x1="3" y1="18" x2="3.01" y2="18"></line>
    </svg>
  </button>

  <!-- Add Player FAB -->
  <button class="fab fab-secondary" onclick="openPlayerModal()">
    <div class="fab-tooltip">Add New Player</div>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
      <circle cx="9" cy="7" r="4"></circle>
      <line x1="19" y1="8" x2="19" y2="14"></line>
      <line x1="22" y1="11" x2="16" y2="11"></line>
    </svg>
  </button>
  
  <!-- Add Match FAB -->
  <button class="fab" onclick="openMatchModal()">
    <div class="fab-tooltip">Record Match</div>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"></line>
      <line x1="5" y1="12" x2="19" y2="12"></line>
    </svg>
  </button>
</div>

<!-- MATCH MODAL -->
<div id="matchModal" class="modal">
  <div class="modal-content">
    <button class="close-modal" onclick="closeModal('matchModal')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    
    <h3>Record Match Result</h3>

    <div class="form-group">
      <label>Match Mode</label>
      <select id="mode">
        <option value="doubles">Doubles</option>
        <option value="singles">Singles</option>
      </select>
    </div>

    <div class="form-group" style="padding: 16px; background: rgba(0,0,0,0.2); border-radius: 12px;">
      <label style="color:#10b981;">Team A</label>
      <select id="a1" style="margin-bottom: 8px;"></select>
      <select id="a2"></select>
    </div>

    <div class="form-group" style="padding: 16px; background: rgba(0,0,0,0.2); border-radius: 12px;">
      <label style="color:#3b82f6;">Team B</label>
      <select id="b1" style="margin-bottom: 8px;"></select>
      <select id="b2"></select>
    </div>

    <div class="form-group row">
      <div>
        <label>Team A Score</label>
        <input id="scoreA" type="number" placeholder="Score A">
      </div>
      <div>
        <label>Team B Score</label>
        <input id="scoreB" type="number" placeholder="Score B">
      </div>
    </div>

    <div class="form-group">
      <label>Passcode 🔐</label>
      <input id="matchSecret" type="password" placeholder="Enter admin passcode">
    </div>

    <button class="submit" id="btnSubmitMatch" onclick="submitMatch()">Submit Result</button>
  </div>
</div>

<!-- PLAYER MODAL -->
<div id="playerModal" class="modal">
  <div class="modal-content">
    <button class="close-modal" onclick="closeModal('playerModal')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    
    <h3>Add New Player</h3>

    <div class="form-group">
      <label>Full Name</label>
      <input id="playerName" type="text" placeholder="e.g. John Doe">
    </div>

    <div class="form-group">
      <label>Passcode 🔐</label>
      <input id="playerSecret" type="password" placeholder="Enter admin passcode">
    </div>

    <button class="submit" id="btnSubmitPlayer" onclick="submitPlayer()">Add Player</button>
  </div>
</div>

<!-- HISTORY MODAL -->
<div id="historyModal" class="modal">
  <div class="modal-content" style="max-width: 500px;">
    <button class="close-modal" onclick="closeModal('historyModal')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
    
    <h3>Match History</h3>

    <div id="historyList" style="display: flex; flex-direction: column; gap: 12px; margin-top: 20px;">
      <!-- Populated by JS -->
    </div>
  </div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzUcMivqqk48FJTOzHGpnlRA5F2r262KB90ZlZoy3JY1Q7jojiKdBw753eo9ug-hthY/exec";

let players = {};
let matches = [];

// -------- LOAD DATA --------
async function loadPlayers() {
  document.getElementById("loader").style.display = "flex";
  document.getElementById("leaderboard").style.display = "none";
  
  try {
    const res = await fetch(API);
    const data = await res.json();

    console.log("API DATA:", data);

    players = data.players || {};
    matches = data.matches || [];

  } catch (error) {
    alert("Failed to load data.");
    console.error(error);
  } finally {
    document.getElementById("loader").style.display = "none";
    document.getElementById("leaderboard").style.display = "grid";
    
    populateDropdowns();
    renderLeaderboard();

    const savedSecret = localStorage.getItem("secret") || "";
    document.getElementById("matchSecret").value = savedSecret;
    document.getElementById("playerSecret").value = savedSecret;
  }
}

// -------- DROPDOWNS --------
function populateDropdowns() {
  const ids = ["a1","a2","b1","b2"];

  ids.forEach(id => {
    const el = document.getElementById(id);
    el.innerHTML = "";

    for (let pid in players) {
      const opt = document.createElement("option");
      opt.value = pid; // STRING
      opt.text = players[pid].name;
      el.appendChild(opt);
    }
  });
}

// -------- LEADERBOARD --------
function renderLeaderboard() {
  const board = document.getElementById("leaderboard");
  board.innerHTML = "";

  const arr = Object.values(players)
    .sort((a,b) => b.rating - a.rating);

  arr.forEach((p, i) => {
    const rank = i + 1;
    const winRate = p.matches
      ? (p.wins / p.matches * 100).toFixed(1)
      : 0;

    const div = document.createElement("div");
    div.className = "card";
    div.setAttribute('data-rank', rank);

    div.innerHTML = `
      <div class="card-header">
        <div class="player-name">${p.name}</div>
        <div class="rank">#${rank}</div>
      </div>
      <div class="stats">
        <div class="stat-item">
          <span class="stat-label">Rating</span>
          <span class="stat-value" style="color:var(--primary);">${Math.round(p.rating)}</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Win Rate</span>
          <span class="stat-value">${winRate}%</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Matches</span>
          <span class="stat-value">${p.matches || 0}</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">Wins</span>
          <span class="stat-value">${p.wins || 0}</span>
        </div>
      </div>
    `;

    board.appendChild(div);
  });
}

// -------- MATCH SUBMIT --------
async function submitMatch() {
  const mode = document.getElementById("mode").value;
  const a1 = document.getElementById("a1").value;
  const a2 = document.getElementById("a2").value;
  const b1 = document.getElementById("b1").value;
  const b2 = document.getElementById("b2").value;

  const scoreA = Number(document.getElementById("scoreA").value);
  const scoreB = Number(document.getElementById("scoreB").value);
  const secret = document.getElementById("matchSecret").value;

  if (!secret) return alert("Enter passcode");
  if (scoreA === scoreB) return alert("No draws allowed");
  if (scoreA < 0 || scoreB < 0) return alert("Invalid scores");

  let teamA, teamB;

  if (mode === "singles") {
    teamA = [a1];
    teamB = [b1];
  } else {
    teamA = [a1, a2];
    teamB = [b1, b2];
  }

  const all = [...teamA, ...teamB];
  if (new Set(all).size !== all.length) {
    return alert("Duplicate players selected!");
  }

  const payload = {
    type: "ADD_MATCH",
    teamA,
    teamB,
    scoreA,
    scoreB,
    secret
  };

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (data.status === "unauthorized") {
      alert("Wrong passcode!");
    } else {
      localStorage.setItem("secret", secret);
      closeModal('matchModal');
      await loadPlayers();
    }

  } catch (err) {
    alert("Error saving match.");
    console.error(err);
  }
}

// -------- DELETE MATCH --------
async function requestDeleteMatch(matchId) {
  const secret = prompt("Enter passcode:");

  if (!secret) return;

  const payload = {
    type: "DELETE_MATCH",
    matchId,
    secret
  };

  const res = await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload)
  });

  const data = await res.json();

  if (data.status === "unauthorized") {
    alert("Wrong passcode!");
  } else {
    await loadPlayers();
    renderHistory();
  }
}

// -------- INIT --------
loadPlayers();
</script>

</body>
</html>
